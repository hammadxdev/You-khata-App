<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="500" fill="url(#backgroundGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="#ffffff" opacity="0.1"/>
  <circle cx="924" cy="400" r="80" fill="#ffffff" opacity="0.08"/>
  <circle cx="850" cy="50" r="40" fill="#ffffff" opacity="0.12"/>
  
  <!-- Main content area -->
  <rect x="50" y="50" width="924" height="400" rx="20" fill="url(#cardGradient)" filter="url(#shadow)"/>
  
  <!-- App icon area -->
  <rect x="80" y="150" width="120" height="120" rx="25" fill="#667eea"/>
  <rect x="90" y="160" width="100" height="100" rx="20" fill="#ffffff"/>
  
  <!-- App icon content -->
  <text x="140" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#667eea">₹</text>
  <text x="140" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#667eea">KHATA</text>
  
  <!-- App title -->
  <text x="240" y="180" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2d3748">Your Khata</text>
  <text x="240" y="210" font-family="Arial, sans-serif" font-size="24" fill="#4a5568">Business Manager</text>
  
  <!-- Tagline -->
  <text x="240" y="250" font-family="Arial, sans-serif" font-size="18" fill="#718096">Manage customers, track transactions, grow your business</text>
  
  <!-- Feature highlights -->
  <g transform="translate(240, 290)">
    <!-- Customer Management -->
    <circle cx="0" cy="0" r="8" fill="#48bb78"/>
    <text x="20" y="5" font-family="Arial, sans-serif" font-size="16" fill="#2d3748">Customer Management</text>
    
    <!-- Transaction Tracking -->
    <circle cx="200" cy="0" r="8" fill="#ed8936"/>
    <text x="220" y="5" font-family="Arial, sans-serif" font-size="16" fill="#2d3748">Transaction Tracking</text>
    
    <!-- Reports & Analytics -->
    <circle cx="400" cy="0" r="8" fill="#9f7aea"/>
    <text x="420" y="5" font-family="Arial, sans-serif" font-size="16" fill="#2d3748">Reports & Analytics</text>
  </g>
  
  <!-- Phone mockup -->
  <g transform="translate(700, 100)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="200" height="300" rx="25" fill="#2d3748"/>
    <rect x="10" y="10" width="180" height="280" rx="20" fill="#000000"/>
    <rect x="15" y="30" width="170" height="240" rx="15" fill="#ffffff"/>
    
    <!-- Screen content -->
    <rect x="25" y="40" width="150" height="30" rx="5" fill="#667eea"/>
    <text x="100" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Dashboard</text>
    
    <!-- Customer list mockup -->
    <rect x="25" y="80" width="150" height="20" rx="3" fill="#f7fafc"/>
    <circle cx="35" cy="90" r="5" fill="#48bb78"/>
    <text x="45" y="93" font-family="Arial, sans-serif" font-size="8" fill="#2d3748">John Doe - ₹5,000</text>
    
    <rect x="25" y="110" width="150" height="20" rx="3" fill="#f7fafc"/>
    <circle cx="35" cy="120" r="5" fill="#ed8936"/>
    <text x="45" y="123" font-family="Arial, sans-serif" font-size="8" fill="#2d3748">Jane Smith - ₹3,200</text>
    
    <rect x="25" y="140" width="150" height="20" rx="3" fill="#f7fafc"/>
    <circle cx="35" cy="150" r="5" fill="#9f7aea"/>
    <text x="45" y="153" font-family="Arial, sans-serif" font-size="8" fill="#2d3748">Mike Johnson - ₹7,800</text>
    
    <!-- Bottom navigation -->
    <rect x="15" y="240" width="170" height="30" rx="15" fill="#f7fafc"/>
    <circle cx="45" cy="255" r="8" fill="#667eea"/>
    <circle cx="100" cy="255" r="8" fill="#e2e8f0"/>
    <circle cx="155" cy="255" r="8" fill="#e2e8f0"/>
  </g>
  
  <!-- Download badge area -->
  <text x="240" y="380" font-family="Arial, sans-serif" font-size="14" fill="#718096">Available on Google Play Store</text>
  
  <!-- Rating stars -->
  <g transform="translate(240, 400)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="20" fill="#ffd700">★★★★★</text>
    <text x="110" y="3" font-family="Arial, sans-serif" font-size="14" fill="#4a5568">Perfect for small businesses</text>
  </g>
</svg>