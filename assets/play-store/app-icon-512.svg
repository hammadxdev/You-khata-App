<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="80" fill="url(#backgroundGradient)"/>
  
  <!-- Decorative background elements -->
  <circle cx="100" cy="100" r="40" fill="#ffffff" opacity="0.1"/>
  <circle cx="412" cy="412" r="60" fill="#ffffff" opacity="0.08"/>
  <circle cx="400" cy="80" r="30" fill="#ffffff" opacity="0.12"/>
  <circle cx="80" cy="400" r="35" fill="#ffffff" opacity="0.1"/>
  
  <!-- Main icon container -->
  <rect x="80" y="80" width="352" height="352" rx="60" fill="url(#iconGradient)" filter="url(#shadow)"/>
  
  <!-- Inner container -->
  <rect x="100" y="100" width="312" height="312" rx="50" fill="#ffffff" filter="url(#innerShadow)"/>
  
  <!-- Currency symbol -->
  <text x="256" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#667eea">₹</text>
  
  <!-- App name -->
  <text x="256" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2d3748">KHATA</text>
  
  <!-- Subtitle -->
  <text x="256" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4a5568">Business Manager</text>
  
  <!-- Decorative elements -->
  <g transform="translate(256, 340)">
    <!-- Small dots representing features -->
    <circle cx="-40" cy="0" r="4" fill="#48bb78"/>
    <circle cx="0" cy="0" r="4" fill="#ed8936"/>
    <circle cx="40" cy="0" r="4" fill="#9f7aea"/>
  </g>
  
  <!-- Corner accent -->
  <path d="M 432 80 L 432 120 L 392 80 Z" fill="#ffffff" opacity="0.2"/>
  <path d="M 80 432 L 120 432 L 80 392 Z" fill="#ffffff" opacity="0.2"/>
</svg>